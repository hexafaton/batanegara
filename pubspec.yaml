name: barata
description: "A new Flutter project."
publish_to: 'none'

version: 1.3.0+3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.0
  webview_flutter_android: ^3.12.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  open_filex: ^4.3.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/barata.png"

flutter:
  uses-material-design: true

  assets:
    - assets/barata.png